<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<link rel="icon" type="image/png" href="/static/favicon.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DeltaZero 控制台</title>
<style>
*{box-sizing:border-box}
body{font-family:"Segoe UI",Arial,sans-serif;margin:0;padding:16px 20px;background:#f0f2f5;color:#1a1a2e}
h1{margin:0 0 12px;font-size:22px}
.row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card{background:#fff;border:1px solid #dde1ea;border-radius:10px;padding:14px 16px;flex:1;min-width:320px}
.card-title{font-weight:700;font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600;color:#fff}
.badge-ok{background:#16a34a}
.badge-down{background:#dc2626}
.kv{margin:3px 0;font-size:13px;line-height:1.6}
.kv .k{color:#64748b;display:inline-block;min-width:80px}
.kv .v{color:#1e293b}
.sep{border:none;border-top:1px solid #e5e7eb;margin:8px 0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 8px;background:#f8fafc;color:#64748b;font-weight:600;border-bottom:2px solid #e2e8f0}
td{padding:5px 8px;border-bottom:1px solid #f1f5f9}
label{display:inline-block;min-width:100px;font-size:13px;color:#475569}
input,select{padding:4px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px}
input[type=number]{width:80px}
button{padding:6px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:opacity .15s}
button:hover{opacity:.85}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#2563eb;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-secondary{background:#6b7280;color:#fff}
.btn-open{background:#7c3aed;color:#fff}
.btn-sm{padding:3px 10px;font-size:12px}
.progress-wrap{background:#e2e8f0;border-radius:8px;height:22px;overflow:hidden;margin:6px 0;position:relative}
.progress-bar{background:#2563eb;height:100%;border-radius:8px;transition:width .4s;min-width:0}
.progress-text{position:absolute;top:0;left:0;right:0;text-align:center;line-height:22px;font-size:12px;font-weight:600;color:#1e293b}
pre{background:#0f172a;color:#e2e8f0;padding:10px;border-radius:8px;max-height:120px;overflow:auto;font-size:12px;margin:6px 0 0}
.toast{position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:8px;color:#fff;font-size:13px;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-ok{background:#16a34a}
.toast-err{background:#dc2626}
</style>
</head>
<body>

<h1><img src="/static/DeltaZero.png" alt="DeltaZero" style="height:96px;vertical-align:middle"/></h1>

<div class="card" style="margin-bottom:12px">
  <div class="kv"><span class="k">服务器时间</span><span class="v" id="sTime">--</span></div>
</div>

<div class="row">
  <div class="card">
    <div class="card-title">DDE</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-primary" onclick="window.open('/dde','_blank')">DDE 抓取面板</button>
      <a href="\vol_smile" target="_blank" style="text-decoration:none"><button class="btn-primary">波动率微笑</button></a>
    </div>
    <div id="metadataFiles" style="margin-top:8px;font-size:12px;color:#64748b"></div>
  </div>
  <div class="card">
    <div class="card-title">Yieldcurve</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-primary" id="btnFetchCgb" onclick="runFetchBond('cgb')">抓取 CGB</button>
      <button class="btn-primary" id="btnFetchShibor" onclick="runFetchBond('shibor')">抓取 Shibor</button>
    </div>
    <div id="bondFilesInfo" style="margin-top:8px;font-size:12px;color:#64748b"></div>
  </div>
</div>

<div class="card" style="margin-bottom:12px">
  <div class="card-title">DataBus <span id="recBadge"></span></div>
  <div id="recStatus">加载中...</div>
  <div style="margin-top:8px">
    <button class="btn-secondary btn-sm" id="btnMerge" onclick="runMerge()">合并今日分片</button>
  </div>
  <pre id="mergeLog" style="display:none;margin-top:8px"></pre>
  <hr class="sep"/>
  <div id="recActions"></div>
</div>

<div class="card" style="margin-bottom:12px">
  <div class="card-title">Monitor — 正向套利监控</div>
  <div style="display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center">
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">利润≥</label><input id="monProfit" type="number" step="1" style="width:60px"/>元</span>
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">到期≤</label><input id="monExpiry" type="number" style="width:55px"/>天</span>
<span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">ATM上下各</label><select id="monNEachSide"><option value="0">all</option><option value="3">3</option><option value="5">5</option><option value="10">10</option></select></span>
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">ZMQ端口</label><input id="monZmq" value="5555" type="number" style="width:60px"/></span>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid #e5e7eb">
    <span style="font-size:12px;color:#64748b;font-weight:600">手续费</span>
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">ETF费率</label><input id="monEtfFee" value="0.0002" type="number" step="0.0001" min="0" max="0.01" style="width:80px"/><span style="font-size:12px;color:#64748b;margin-left:4px">（约万2）</span></span>
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">期权单边</label><input id="monOptFee" value="1.5" type="number" step="0.1" min="0" style="width:60px"/>元/张</span>
    <span class="kv" style="margin:0"><label style="min-width:auto;margin-right:4px">利息成本</label><select id="monInterest"><option value="0" selected>日内（不计利息）</option><option value="1">持有到期（含利息）</option></select></span>
    <button class="btn-primary" onclick="startMonitor()">启动 Monitor</button>
    <a href="/monitor" target="_blank" style="text-decoration:none"><button class="btn-open">打开套利监控页</button></a>
  </div>
</div>

<div class="card" style="margin-bottom:12px">
  <div class="card-title">
    进程总览
    <span id="procCount" class="badge badge-ok">0</span>
    <span style="flex:1"></span>
    <button class="btn-danger btn-sm" onclick="killAll()">关闭所有进程</button>
  </div>
  <table>
    <thead><tr><th>类型</th><th>PID</th><th>参数</th><th>运行时长</th><th>操作</th></tr></thead>
    <tbody id="procBody"><tr><td colspan="5" style="color:#94a3b8">加载中...</td></tr></tbody>
  </table>
</div>


<div class="toast" id="toast"></div>

<script>
const POLL_MS = 3000;
let pollTimer = null;
let marketDataDir = "";

function $(id){ return document.getElementById(id); }

function toast(msg, ok=true){
  const el = $("toast");
  el.className = "toast show " + (ok ? "toast-ok" : "toast-err");
  el.innerText = msg;
  setTimeout(()=> el.className = "toast", 2500);
}

async function api(url, method="GET", body=null){
  const opts = {method, headers:{"Content-Type":"application/json"}};
  if(body) opts.body = JSON.stringify(body);
  const resp = await fetch(url, opts);
  const data = await resp.json();
  if(!resp.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}

async function openFile(path){
  try{ await api("/api/open-file","POST",{path}); }
  catch(e){ alert("打开失败: " + e.message); }
}

document.addEventListener("click", function(e){
  const a = e.target.closest("a[data-open-path]");
  if(!a) return;
  e.preventDefault();
  openFile(a.dataset.openPath);
});

function fileLink(name, path){
  if(!path) return name;
  const escapedPath = path.replace(/&/g,"&amp;").replace(/"/g,"&quot;");
  return `<a href="#" data-open-path="${escapedPath}" style="color:inherit;text-decoration:underline;cursor:pointer">${name}</a>`;
}

function renderMetadataFiles(mf){
  const el = $("metadataFiles");
  if(!mf){
    el.innerHTML = "";
    return;
  }
  const files = [
    ["wind_sse_optionchain.xlsx", mf.wind_sse_optionchain],
    ["wxy_options.xlsx",           mf.wxy_options],
  ];
  const lines = files.map(([name, info]) => {
    const ago = info ? info.mtime_ago : "未找到";
    const s = (!info || ago === "未找到" || ago === "文件不存在") ? "badge-down" : "badge-ok";
    const link = fileLink(name, info && info.path);
    return `<div class="kv" style="margin:2px 0">${link} <span class="badge ${s}">${ago}</span></div>`;
  });
  el.innerHTML = lines.join("");
}

function renderBondFiles(bf){
  const el = $("bondFilesInfo");
  if(!el || !bf) return;
  const lines = [];
  const cgb = bf.cgb_yieldcurve;
  const shibor = bf.shibor_yieldcurve;
  if(cgb){
    const s = cgb.mtime_ago === "文件不存在" ? "badge-down" : "badge-ok";
    const link = fileLink(cgb.name || "—", cgb.path);
    lines.push(`<div class="kv" style="margin:2px 0">${link} <span class="badge ${s}">${cgb.mtime_ago}</span></div>`);
  }
  if(shibor){
    const s = shibor.mtime_ago === "文件不存在" ? "badge-down" : "badge-ok";
    const link = fileLink(shibor.name || "—", shibor.path);
    lines.push(`<div class="kv" style="margin:2px 0">${link} <span class="badge ${s}">${shibor.mtime_ago}</span></div>`);
  }
  el.innerHTML = lines.join("");
}

function renderRecorder(st){
  const el = $("recStatus");
  const act = $("recActions");
  const badge = $("recBadge");
  if(st.recorder_running){
    const rec = st.processes.find(p => p.kind === "databus");
    badge.className = "badge badge-ok";
    badge.innerText = "运行中";
    let html = `<div class="kv"><span class="k">状态</span><span class="v" style="color:#16a34a;font-weight:700">● 运行中  PID ${rec.pid}  已运行 ${rec.uptime}</span></div>`;
    if(rec && rec.params){
      html += `<div class="kv"><span class="k">采集参数</span><span class="v">${rec.params}</span></div>`;
    }
    if(st.recorder_count > 1){
      html += `<div class="kv" style="color:#d97706;font-weight:600">⚠ 检测到 ${st.recorder_count} 个 DataBus 实例！</div>`;
    }
    const s = st.snapshot;
    if(s && s.status === "ok"){
      html += `<div class="kv"><span class="k">品种覆盖</span><span class="v">${s.coverage}</span></div>`;
      let optLine = `${s.n_options} 合约`;
      if(s.adj_count) optLine += `  其中调整型 ${s.adj_count}`;
      html += `<div class="kv"><span class="k">期权快照</span><span class="v">${optLine}</span></div>`;
      html += `<div class="kv"><span class="k">ETF 快照</span><span class="v">${s.n_etf} 条</span></div>`;
      if(s.mtime) html += `<div class="kv"><span class="k">快照更新</span><span class="v">${s.mtime}（${s.mtime_age}）</span></div>`;
    }
    const m = st.merge_status;
    if(m){
      const now = new Date();
      const afterMergeTime = (now.getHours() > 15) || (now.getHours() === 15 && now.getMinutes() >= 10);
      if(m.merged_full){
        html += `<div class="kv"><span class="k">日终合并</span><span class="v" style="color:#16a34a;font-weight:600">已自动合并 ${m.date}${m.mtime ? `（${m.mtime}，${m.mtime_age}）` : ""}</span></div>`;
      } else if(m.merged_any){
        html += `<div class="kv"><span class="k">日终合并</span><span class="v" style="color:#d97706;font-weight:600">部分完成 ${m.date}（options=${m.options_exists ? "✓" : "×"} / etf=${m.etf_exists ? "✓" : "×"}）</span></div>`;
      } else {
        const color = afterMergeTime ? "#dc2626" : "#64748b";
        const text = afterMergeTime ? "未合并（已过 15:10）" : "未合并（15:10 后自动触发）";
        html += `<div class="kv"><span class="k">日终合并</span><span class="v" style="color:${color};font-weight:600">${text}</span></div>`;
      }
    }
    const c = st.chunks;
    if(c && (c.n_opt > 0 || c.n_etf > 0)){
      let chk = `期权 ${c.n_opt} 个  ETF ${c.n_etf} 个  共 ${c.total_mb} MB`;
      if(c.latest_time) chk += `  最新 ${c.latest_time}`;
      html += `<div class="kv"><span class="k">今日分片</span><span class="v">${chk}</span></div>`;
    }
    el.innerHTML = html;
    act.innerHTML = ``;
  } else {
    badge.className = "badge badge-down";
    badge.innerText = "未运行";
    let html = `<div class="kv"><span class="k">状态</span><span class="v" style="color:#dc2626;font-weight:700">● 未运行</span></div>`;
    const m = st.merge_status;
    if(m){
      const now = new Date();
      const afterMergeTime = (now.getHours() > 15) || (now.getHours() === 15 && now.getMinutes() >= 10);
      if(m.merged_full){
        html += `<div class="kv"><span class="k">日终合并</span><span class="v" style="color:#16a34a;font-weight:600">已自动合并 ${m.date}${m.mtime ? `（${m.mtime}，${m.mtime_age}）` : ""}</span></div>`;
      } else if(m.merged_any){
        html += `<div class="kv"><span class="k">日终合并</span><span class="v" style="color:#d97706;font-weight:600">部分完成 ${m.date}（options=${m.options_exists ? "✓" : "×"} / etf=${m.etf_exists ? "✓" : "×"}）</span></div>`;
      } else {
        const color = afterMergeTime ? "#dc2626" : "#64748b";
        const text = afterMergeTime ? "未合并（已过 15:10）" : "未合并（15:10 后自动触发）";
        html += `<div class="kv"><span class="k">日终合并</span><span class="v" style="color:${color};font-weight:600">${text}</span></div>`;
      }
    }
    const c = st.chunks;
    if(c && (c.n_opt > 0 || c.n_etf > 0)){
      let chk = `期权 ${c.n_opt} 个  ETF ${c.n_etf} 个  共 ${c.total_mb} MB`;
      if(c.latest_time) chk += `  最新 ${c.latest_time}`;
      html += `<div class="kv"><span class="k">今日分片</span><span class="v">${chk}</span></div>`;
    } else if(c){
      html += `<div class="kv"><span class="k">今日分片</span><span class="v" style="color:#94a3b8">暂无</span></div>`;
    }
    el.innerHTML = html;
    act.innerHTML = `
      <button class="btn-primary btn-sm" onclick="startRecorder('dde')">启动 DDE DataBus</button>
    `;
  }
}

function renderProcessTable(procs){
  const body = $("procBody");
  $("procCount").innerText = procs.length;
  if(procs.length === 0){
    $("procCount").className = "badge";
    $("procCount").style.cssText = "background:#94a3b8";
    body.innerHTML = `<tr><td colspan="5" style="color:#94a3b8">无运行中的进程</td></tr>`;
    return;
  }
  $("procCount").className = "badge badge-ok";
  $("procCount").style.cssText = "";
  const kindLabel = {databus:"DataBus", monitor:"Monitor", vol_smile:"VolSmile 计算"};
  const kindColor = {databus:"#2563eb", monitor:"#16a34a", vol_smile:"#7c3aed"};
  body.innerHTML = procs.map(p => {
    const isInternal = p.kind === "vol_smile";
    const pidCell = isInternal ? `<span style="color:#94a3b8">内置</span>` : p.pid;
    const actionCell = isInternal ? `` :
      `<button class="btn-open btn-sm" onclick="reopenPid(${p.pid})" title="关闭并在新窗口重开">重开窗口</button>
       <button class="btn-danger btn-sm" onclick="killPid(${p.pid})">关闭</button>`;
    return `<tr>
      <td><span style="color:${kindColor[p.kind]||'#333'};font-weight:600">${kindLabel[p.kind]||p.kind}</span></td>
      <td>${pidCell}</td>
      <td style="color:#475569">${p.params}</td>
      <td>${p.uptime}</td>
      <td>${actionCell}</td>
    </tr>`;
  }).join("");
}

let _profitDefaultSet = false;
async function refresh(){
  try{
    const st = await api("/api/state");
    marketDataDir = st.market_data_dir || marketDataDir;
    $("sTime").innerText = st.server_time;
    if (!_profitDefaultSet && st.default_min_profit != null) {
      $("monProfit").value = st.default_min_profit;
      $("monExpiry").value = st.default_expiry_days;
$("monNEachSide").value = st.default_n_each_side;
      _profitDefaultSet = true;
    }
    renderMetadataFiles(st.metadata_files);
    renderBondFiles(st.bond_files);
    renderRecorder(st);
    renderProcessTable(st.processes);
  } catch(e){ console.error(e); }
}

async function killPid(pid){
  if(!confirm("确认关闭 PID "+pid+"?")) return;
  try{ await api(`/api/processes/${pid}/kill`,"POST"); toast("已关闭 PID "+pid); }
  catch(e){ toast(e.message, false); }
  await refresh();
}

async function reopenPid(pid){
  if(!confirm("将关闭 PID "+pid+" 并在新窗口重新启动，确认？")) return;
  try{
    const r = await api(`/api/processes/${pid}/reopen`,"POST");
    toast("已重开窗口，新 PID "+r.started.pid);
  } catch(e){ toast(e.message, false); }
  setTimeout(refresh, 1500);
}

async function killAll(){
  if(!confirm("确认关闭所有 DataBus 和 Monitor 进程？")) return;
  try{
    const r = await api("/api/processes/kill-all","POST");
    toast(`已关闭 ${r.killed.length} 个进程`);
  } catch(e){ toast(e.message, false); }
  await refresh();
}

async function startRecorder(source="dde"){
  try{
    const r = await api("/api/processes/recorder/start","POST", { source, zmq_port: parseInt($("monZmq").value) || 5555 });
    toast(`${source.toUpperCase()} DataBus 已启动 PID `+r.started.pid);
  } catch(e){ toast(e.message, false); }
  setTimeout(refresh, 1500);
}

async function startMonitor(){
  const body = {
    min_profit: parseFloat($("monProfit").value),
    expiry_days: parseInt($("monExpiry").value),
n_each_side: parseInt($("monNEachSide").value) || 0,
    zmq_port: parseInt($("monZmq").value),
    snapshot_dir: marketDataDir,
    etf_fee_rate: parseFloat($("monEtfFee").value) || 0.0002,
    option_one_side_fee: parseFloat($("monOptFee").value) || 1.5,
    include_interest: $("monInterest").value === "1"
  };
  try{
    const r = await api("/api/processes/monitor/start","POST",body);
    toast("Monitor 已启动 PID "+r.started.pid);
  } catch(e){ toast(e.message, false); }
  setTimeout(refresh, 1500);
}

async function runMerge(){
  $("btnMerge").disabled = true;
  $("mergeLog").style.display = "block";
  $("mergeLog").innerText = "正在合并今日分片...";
  try{
    const r = await api("/api/actions/merge","POST");
    $("mergeLog").innerText = (r.ok ? "✓ 成功\n" : "✗ 失败\n") + (r.output || "");
    toast(r.ok ? "分片合并完成" : "合并失败", r.ok);
  } catch(e){
    $("mergeLog").innerText = "错误: "+e.message;
    toast(e.message, false);
  }
  $("btnMerge").disabled = false;
  await refresh();
}

async function runFetchBond(kind){
  const btn = kind === "cgb" ? $("btnFetchCgb") : $("btnFetchShibor");
  btn.disabled = true;
  try{
    const r = await api("/api/actions/fetch-bond","POST",{kind});
    toast(r.ok ? (kind === "cgb" ? "CGB 抓取完成" : "Shibor 抓取完成") : r.output, r.ok);
    if(r.bond_files) renderBondFiles(r.bond_files);
  } catch(e){
    toast(e.message, false);
  }
  btn.disabled = false;
  await refresh();
}

refresh();
pollTimer = setInterval(refresh, POLL_MS);

</script>
</body>
</html>
